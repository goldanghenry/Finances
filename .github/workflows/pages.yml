name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# gh-pages 브랜치에 push (Settings → Pages → branch: gh-pages 필요)
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs
        run: pip install -r requirements-docs.txt

      - name: Lint reader-friendly corpus
        run: python scripts/lint_reader_friendly.py

      - name: Materialize webdocs (dereference symlinks)
        run: python scripts/materialize_webdocs.py

      - name: Generate Phase navigation
        run: python scripts/generate_phase_nav.py

      - name: Build site
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: mkdocs build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
