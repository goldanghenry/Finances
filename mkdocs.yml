exclude_docs: |
  /private/
  /docs/DEPTH-STANDARD.md
  /docs/TEMPLATE.md
  /docs/TERMINOLOGY-STANDARD.md
  /docs/L3-CORPUS-STATUS.md
  /docs/L4-ECONOMICS-STATUS.md
  /docs/GOLD-CHAPTER-STANDARD.md
  /docs/private-notes.md
  /docs/github-pages-deploy.md
  /docs/phase-reading-order.yaml

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    # navigation.expand 제거 → Phase/섹션 메뉴가 처음엔 모두 접힌 상태
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang:
        - ko
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore
    anchors: ignore
    absolute_links: ignore
    unrecognized_links: ignore

extra:
  generator: false

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
