# GitHub Pages (MkDocs Material). site_url은 CI에서 주입.
site_name: 금융·투자 학습 KB
site_description: L3+ 금융·투자 교육 코퍼스
site_url: !ENV [SITE_URL, 'http://127.0.0.1:8000/']

repo_url: https://github.com/goldanghenry/Finances
repo_name: goldanghenry/Finances
edit_uri: edit/main/

docs_dir: webdocs
site_dir: site

exclude_docs: |
  /private/

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang:
        - ko
        - en
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore
    anchors: ignore
    absolute_links: ignore
    unrecognized_links: ignore

extra:
  generator: false

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
